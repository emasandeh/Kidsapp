# Kidsapp Codemagic Configuration
workflow-definition:
  name: Kidsapp iOS Build
  max_build_duration: 60
  instance_type: mac_mini_m1
  environment:
    groups:
      # This is where you store your encrypted Apple credentials
      - apple_credentials 
    vars:
      XCODE_WORKSPACE: "ios/Runner.xcworkspace"
      XCODE_SCHEME: "Runner"
    flutter: stable
    xcode: latest
    cocoapods: default

  scripts:
    - name: Get Flutter packages
      script: |
        flutter pub get
    - name: Install CocoaPods
      script: |
        find . -name "Podfile" -execdir pod install \;
    - name: Flutter build ipa
      script: |
        # The --release and --no-codesign/build-name flags are crucial
        flutter build ipa --release --export-method ad-hoc
        
  artifacts:
    # This tells Codemagic to look for the .ipa file and make it available for download
    - build/ios/ipa/*.ipa
    - /tmp/xcodebuild_logs/*.log

  publishing:
    email:
      recipients:
        - YOUR_EMAIL@EXAMPLE.COM
