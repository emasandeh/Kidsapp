# Kidsapp Codemagic Configuration
# Reference: emasandeh/Kidsapp

workflows:
  ios-workflow:
    name: Kidsapp iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      groups:
        - apple_credentials # Create this group in Codemagic UI and upload your certificates
      vars:
        BUNDLE_ID: "com.your.app.id" # Replace with your Bundle ID
        XCODE_SCHEME: "Runner"

    scripts:
      - name: Set up keychain and fetching signing files
        script: |
          keychain initialize
          # This command fetches certificates automatically if App Store Connect API is linked
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_ADHOC --create
          keychain add-certificates
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install CocoaPods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Build IPA
        script: |
          # This is the command that generates the .ipa file
          flutter build ipa --release --export-method ad-hoc --build-name=1.0.0 --build-number=1

    artifacts:
      # This ensures the .ipa file shows up in your build results
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - emasandeh@gmail.com 
